<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20031110.xyz - 个人展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .status {
            display: inline-block;
            padding: 10px 30px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border-radius: 50px;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .info {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: left;
        }
        .info h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        .info ul {
            list-style: none;
            padding-left: 0;
        }
        .info li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info li:last-child {
            border-bottom: none;
        }
        .icon {
            font-size: 1.5em;
            margin-right: 10px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 欢迎访问</h1>
        <p>20031110.xyz - 我的个人展示网站</p>
        
        <div class="status">✨ 网站正在运行中 ✨</div>
        
        <div class="info">
            <h3>📌 网站信息</h3>
            <ul>
                <li><span class="icon">🌐</span>托管平台：Cloudflare Pages</li>
                <li><span class="icon">🚀</span>全球 CDN 加速</li>
                <li><span class="icon">🔒</span>HTTPS 安全连接</li>
                <li><span class="icon">📱</span>响应式设计</li>
            </ul>
        </div>
        
        <div class="footer">
            © 2025 20031110.xyz - 使用 Cloudflare Pages 构建
        </div>
    </div>
</body>
</html>
